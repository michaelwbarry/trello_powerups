<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Title Length Settings</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="../shared/trello-helpers.js"></script>
  <script src="settings.js"></script>
  <style>
    /*
     * Theme-aware colors. Trello sets `data-color-mode="light"` or
     * `data-color-mode="dark"` on the <html> element of any Power-Up iframe
     * once TrelloPowerUp.iframe() is called (see settings.js). Defaults below
     * are the light values; the dark block overrides them.
     *
     * Pattern from:
     * https://developer.atlassian.com/cloud/trello/power-ups/color-theme-compliance/using-css-custom-properties/
     */
    :root {
      --tl-text:              #172b4d;
      --tl-text-subtle:       #5e6c84;
      --tl-border:            #dfe1e6;
      --tl-input-bg:          #ffffff;
      --tl-input-text:        #172b4d;
      --tl-focus-border:      #0079bf;
      --tl-primary-bg:        #0079bf;
      --tl-primary-bg-hover:  #026aa7;
      --tl-primary-text:      #ffffff;
      --tl-error:             #c9372c;
      --tl-secondary-text:        #5e6c84;
      --tl-secondary-text-hover:  #172b4d;
    }
    html[data-color-mode="dark"] {
      --tl-text:              #b6c2cf;
      --tl-text-subtle:       #8c9bab;
      --tl-border:            #454f59;
      --tl-input-bg:          #22272b;
      --tl-input-text:        #b6c2cf;
      --tl-focus-border:      #579dff;
      --tl-primary-bg:        #579dff;
      --tl-primary-bg-hover:  #85b8ff;
      --tl-primary-text:      #1d2125;
      --tl-error:             #f87168;
      --tl-secondary-text:        #8c9bab;
      --tl-secondary-text-hover:  #b6c2cf;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: var(--tl-text);
      background: transparent;
      margin: 0;
      padding: 16px;
    }
    fieldset {
      border: 1px solid var(--tl-border);
      border-radius: 3px;
      padding: 12px;
      margin: 0 0 12px 0;
    }
    legend {
      font-weight: 600;
      padding: 0 4px;
      color: var(--tl-text);
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--tl-text);
    }
    label:last-child {
      margin-bottom: 0;
    }
    .label-text {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--tl-text);
    }
    .hint {
      font-weight: 400;
      color: var(--tl-text-subtle);
      font-size: 12px;
    }
    input[type="number"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid var(--tl-border);
      border-radius: 3px;
      font-size: 14px;
      background: var(--tl-input-bg);
      color: var(--tl-input-text);
      font-family: inherit;
    }
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--tl-focus-border);
    }
    .error {
      color: var(--tl-error);
      font-size: 12px;
      margin-top: -4px;
      margin-bottom: 12px;
      min-height: 16px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 3px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }
    .save {
      background: var(--tl-primary-bg);
      color: var(--tl-primary-text);
    }
    .save:hover {
      background: var(--tl-primary-bg-hover);
    }
    .reset {
      background: transparent;
      color: var(--tl-secondary-text);
    }
    .reset:hover {
      color: var(--tl-secondary-text-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <form id="settings-form">
    <fieldset>
      <legend>Warn</legend>
      <label>
        <span class="label-text">
          Threshold
          <span class="hint">— titles longer than this get a warn badge</span>
        </span>
        <input type="number" id="warn-threshold" min="1" max="16384" required>
      </label>
      <label>
        <span class="label-text">Color</span>
        <select id="warn-color"></select>
      </label>
    </fieldset>
    <fieldset>
      <legend>Alert</legend>
      <label>
        <span class="label-text">
          Threshold
          <span class="hint">— titles longer than this get an alert badge with a ⚠</span>
        </span>
        <input type="number" id="alert-threshold" min="1" max="16384" required>
      </label>
      <label>
        <span class="label-text">Color</span>
        <select id="alert-color"></select>
      </label>
    </fieldset>
    <div class="error" id="error" role="alert"></div>
    <div class="actions">
      <button type="submit" class="save">Save</button>
      <button type="button" class="reset" id="reset-btn">Reset to defaults</button>
    </div>
  </form>
</body>
</html>
