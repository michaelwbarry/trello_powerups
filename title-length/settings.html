<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Title Length Settings</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="../shared/trello-helpers.js"></script>
  <script src="settings.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: #172b4d;
      margin: 0;
      padding: 16px;
    }
    fieldset {
      border: 1px solid #dfe1e6;
      border-radius: 3px;
      padding: 12px;
      margin: 0 0 12px 0;
    }
    legend {
      font-weight: 600;
      padding: 0 4px;
    }
    label {
      display: block;
      margin-bottom: 8px;
    }
    label:last-child {
      margin-bottom: 0;
    }
    .label-text {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .hint {
      font-weight: 400;
      color: #5e6c84;
      font-size: 12px;
    }
    input[type="number"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #dfe1e6;
      border-radius: 3px;
      font-size: 14px;
      background: white;
    }
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #0079bf;
    }
    .error {
      color: #c9372c;
      font-size: 12px;
      margin-top: -4px;
      margin-bottom: 12px;
      min-height: 16px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 3px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }
    .save {
      background: #0079bf;
      color: white;
    }
    .save:hover { background: #026aa7; }
    .reset {
      background: transparent;
      color: #5e6c84;
    }
    .reset:hover { color: #172b4d; text-decoration: underline; }
  </style>
</head>
<body>
  <form id="settings-form">
    <fieldset>
      <legend>Warn</legend>
      <label>
        <span class="label-text">
          Threshold
          <span class="hint">— titles longer than this get a warn badge</span>
        </span>
        <input type="number" id="warn-threshold" min="1" max="16384" required>
      </label>
      <label>
        <span class="label-text">Color</span>
        <select id="warn-color"></select>
      </label>
    </fieldset>
    <fieldset>
      <legend>Alert</legend>
      <label>
        <span class="label-text">
          Threshold
          <span class="hint">— titles longer than this get an alert badge with a ⚠</span>
        </span>
        <input type="number" id="alert-threshold" min="1" max="16384" required>
      </label>
      <label>
        <span class="label-text">Color</span>
        <select id="alert-color"></select>
      </label>
    </fieldset>
    <div class="error" id="error" role="alert"></div>
    <div class="actions">
      <button type="submit" class="save">Save</button>
      <button type="button" class="reset" id="reset-btn">Reset to defaults</button>
    </div>
  </form>
</body>
</html>
